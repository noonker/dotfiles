# ── Font ─────────────────────────────────────────────────────────────────────
font_family      Comic Code
bold_font        Comic Code Bold
italic_font      Comic Code Italic
bold_italic_font Comic Code Bold Italic
font_size        12.0

# Nerd Font symbol fallback via JetBrains Mono (covers icons used in waybar/tmux)
symbol_map U+E000-U+E00A,U+EA60-U+EBEB,U+E0A0-U+E0C8,U+E0CA,U+E0CC-U+E0D7,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B1,U+E700-U+E7C5,U+F000-U+F2E0,U+F300-U+F372,U+F400-U+F532,U+F0001-U+F1AF0 JetBrains Mono

# ── Cursor ───────────────────────────────────────────────────────────────────
cursor_shape          block
cursor_blink_interval 0

# ── Scrollback ───────────────────────────────────────────────────────────────
# Match tmux history-limit
scrollback_lines 30000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ── Mouse ────────────────────────────────────────────────────────────────────
mouse_hide_wait       3.0
copy_on_select        clipboard
strip_trailing_spaces smart
focus_follows_mouse   yes

# ── URLs ─────────────────────────────────────────────────────────────────────
url_style    curly
url_color    #83a598
detect_urls  yes
open_url_with default

# ── Bell ─────────────────────────────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0.0
window_alert_on_bell yes

# ── Window ───────────────────────────────────────────────────────────────────
remember_window_size    yes
# Match sway's inner gap
window_padding_width    6
hide_window_decorations no

# ── Tab bar ──────────────────────────────────────────────────────────────────
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
# Only show bar when there are multiple tabs (pairs well with tmux)
tab_bar_min_tabs        2
tab_title_template      "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# ── Gruvbox Dark ─────────────────────────────────────────────────────────────
foreground           #ebdbb2
background           #282828
selection_foreground #282828
selection_background #d5c4a1

cursor            #ebdbb2
cursor_text_color #282828

# normal
color0  #32302f
color1  #cc241d
color2  #98971a
color3  #d79921
color4  #458588
color5  #b16286
color6  #689d6a
color7  #a89984

# bright
color8  #665c54
color9  #fb4934
color10 #b8bb26
color11 #fabd2f
color12 #83a598
color13 #d3869b
color14 #8ec07c
color15 #ebdbb2

# Tab bar (Gruvbox yellow accent for active)
active_tab_foreground   #282828
active_tab_background   #fabd2f
inactive_tab_foreground #a89984
inactive_tab_background #3c3836

# Marks (for ctrl+shift+z mark workflow)
mark1_foreground #282828
mark1_background #fabd2f
mark2_foreground #282828
mark2_background #83a598
mark3_foreground #282828
mark3_background #d3869b

# ── Keybindings ──────────────────────────────────────────────────────────────
# Vim-style window navigation (mirrors sway's mod+hjkl)
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Splits that open in the current working directory
map ctrl+shift+\     launch --location=vsplit --cwd=current
map ctrl+shift+minus launch --location=hsplit --cwd=current

# New tab in current directory
map ctrl+shift+t new_tab_with_cwd

# Jump to tab by number (alt+N avoids conflict with sway's mod+N workspace switching)
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5

# Font size
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0     change_font_size all 0

# ── Shell integration ────────────────────────────────────────────────────────
# Enables prompt tracking, cwd in tab title, marks at each prompt, etc.
shell_integration enabled

# ── Clipboard (Wayland) ──────────────────────────────────────────────────────
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# ── Remote control ───────────────────────────────────────────────────────────
allow_remote_control socket-only
listen_on            unix:/tmp/kitty

# ── Wayland ──────────────────────────────────────────────────────────────────
linux_display_server wayland
