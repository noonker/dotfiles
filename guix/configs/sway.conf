set $mod Mod4
# XDG Desktop Portal (for file pickers, screen sharing)
exec dbus-update-activation-environment --all
exec wlsunset -l 44.4 -L 88.0
exec mako --border-radius=2 --font="JetBrains Mono 8" --max-visible=5 --outer-margin=5 --margin=3 --background="#1c1f26" --border-color="#89AAEB" --border-size=1 --default-timeout=7000
exec emacsclient -c

### Variables
### set $mod Mod4
set $term kitty
set $menu wofi --show drun --allow-images
set $lock swaylock -f -c 333333

set $system_theme 'Arc-Dark'
set $system_icons 'Numix-Square'
set $system_dpi_scaling_factor 1.0
set $cursor_size 68
set $cursor_theme Adwaita
set $titlebar_text_size 12
set $titlebar_font Cantarell

### seat seat0 xcursor_theme Vimix-cursors 24 

### Idle & Lock
exec swayidle -w \
    timeout 300 '$lock' \
    timeout 600 'swaymsg "output * power off"' \
    resume 'swaymsg "output * power on"' \
    before-sleep '$lock'

### Input (touchpad like GNOME)
input type:touchpad {
    tap enabled
    natural_scroll enabled
    dwt enabled
    middle_emulation enabled
}

# Allow switching between workspaces with left and right swipes
bindgesture swipe:right workspace prev
bindgesture swipe:left workspace next
    
# Allow container movements by pinching them
bindgesture pinch:inward+up move up
bindgesture pinch:inward+down move down
bindgesture pinch:inward+left move left
bindgesture pinch:inward+right move right

input type:keyboard {
    xkb_options caps:ctrl_modifier
}

### Look & Feel (GNOME-like)
font pango:Cantarell 11
default_border pixel 2
default_floating_border normal
gaps inner 6
gaps outer 2
smart_gaps on
smart_borders on

# Colors (Adwaita-ish)
client.focused          #3584e4 #3584e4 #ffffff #3584e4 #3584e4
client.unfocused        #2d2d2d #2d2d2d #888888 #2d2d2d #2d2d2d
client.focused_inactive #2d2d2d #2d2d2d #888888 #2d2d2d #2d2d2d

### Status Bar (waybar recommended, but default works)
bar {
    swaybar_command waybar
}

### Key Bindings

# Basics
bindsym $mod+q kill
bindsym $mod+d exec $menu
bindsym $mod+Shift+c reload
bindsym $mod+Shift+e exec swaynag -t warning -m 'Exit Sway?' -B 'Yes' 'swaymsg exit'
bindsym $mod+Escape exec $lock
bindsym $mod+Tab exec rofi -show window
bindsym $mod+Space exec rofi -show drun 

# Floating drag (like GNOME: Super+drag)
floating_modifier $mod normal

# Password Store
bindsym $mod+p exec rofi-pass

# Cliphist
bindsym $mod+i exec cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Bookmarks
bindsym $mod+b exec ~/bin/bookmark-search

# Org capture
bindsym $mod+c exec ~/bin/org-today-capture

# Focus 
bindsym $mod+h focus left
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right

# Move windows
bindsym $mod+Shift+h move left
bindsym $mod+Shift+j move down
bindsym $mod+Shift+k move up
bindsym $mod+Shift+l move right

# Workspaces (1-9 like GNOME)
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9

bindsym $mod+Shift+1 move container to workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2
bindsym $mod+Shift+3 move container to workspace number 3
bindsym $mod+Shift+4 move container to workspace number 4
bindsym $mod+Shift+5 move container to workspace number 5
bindsym $mod+Shift+6 move container to workspace number 6
bindsym $mod+Shift+7 move container to workspace number 7
bindsym $mod+Shift+8 move container to workspace number 8
bindsym $mod+Shift+9 move container to workspace number 9

# Layout
bindsym $mod+g splith
bindsym $mod+v splitv
bindsym $mod+f fullscreen
bindsym $mod+Shift+space floating toggle
# bindsym $mod+space focus mode_toggle
bindsym $mod+a focus parent
bindsym $mod+s layout stacking
bindsym $mod+w layout tabbed
bindsym $mod+e layout toggle split

# Resize mode
mode "resize" {
    bindsym Left resize shrink width 20px
    bindsym Down resize grow height 20px
    bindsym Up resize shrink height 20px
    bindsym Right resize grow width 20px
    bindsym Return mode "default"
    bindsym Escape mode "default"
}
bindsym $mod+r mode "resize"

# Screenshots (like GNOME)
bindsym Print exec grim - | wl-copy -t image/png
bindsym Shift+Print exec grim -g "$(slurp)" - | wl-copy -t image/png
bindsym $mod+Print exec sh -c 'mkdir -p ~/Pictures && grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png'
bindsym $mod+Shift+Print exec sh -c 'mkdir -p ~/Pictures && grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png'

# Media keys
bindsym XF86AudioRaiseVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindsym XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindsym XF86AudioMute exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindsym XF86AudioMicMute exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindsym XF86MonBrightnessUp exec brightnessctl set +5%
bindsym XF86MonBrightnessDown exec brightnessctl set 5%-
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous

### GNOME-like niceties

# PolicyKit agent (for GUI auth prompts)
exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# GTK
# This is the only place where you must set GTK scaling
set $gnome-schema org.gnome.desktop.interface
exec_always {
  gsettings set $gnome-schema gtk-theme $system_theme
  gsettings set $gnome-schema icon-theme $system_icons
  gsettings set $gnome-schema text-scaling-factor $system_dpi_scaling_factor
  gsettings set $gnome-schema cursor-theme $cursor_theme
  gsettings set $gnome-schema cursor-size $cursor_size
}

# Mouse
seat seat0 xcursor_theme $cursor_theme $cursor_size

# Fonts (For sway window titles only)
font pango:$titlebar_font $titlebar_text_size

# Float certain windows (like GNOME dialogs)
for_window [window_role="pop-up"] floating enable
for_window [window_role="dialog"] floating enable
for_window [window_role="task_dialog"] floating enable
for_window [app_id="pavucontrol"] floating enable
for_window [app_id="nm-connection-editor"] floating enable
for_window [app_id="blueman-manager"] floating enable
for_window [app_id="gnome-calculator"] floating enable
for_window [title="File Operation Progress"] floating enable

exec_always wl-paste --watch cliphist store

bindsym $mod+Return exec emacsclient -c
bindsym $mod+backslash exec firefox

## Clamshell Mode
exec_always swaylid
set $laptop eDP-1
bindswitch --reload --locked lid:on output $laptop disable
bindswitch --reload --locked lid:off output $laptop enable

for_window [class=".*"] inhibit_idle fullscreen
for_window [app_id=".*"] inhibit_idle fullscreen

## Shader Background
exec_always shaderbg '*' ~/.config/shaders/background.frag